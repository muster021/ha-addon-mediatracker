name: Bump version on release

on:
  push:
    tags:
      - "v*"

jobs:
  bump-version:
    name: Bump add-on version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update config.yaml version
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.version.outputs.version }}\"/" mediatracker/config.yaml

      - name: Update Dockerfile base image version
        run: |
          sed -i "s|ARG BUILD_FROM=ghcr.io/muster021/mediatracker:.*|ARG BUILD_FROM=ghcr.io/muster021/mediatracker:${{ steps.version.outputs.version }}|" mediatracker/Dockerfile

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mediatracker/config.yaml mediatracker/Dockerfile
          git diff --staged --quiet || git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git push origin main
